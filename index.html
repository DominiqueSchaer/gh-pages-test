<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Pages Test</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
        color: white;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 42rem;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.1rem;
        opacity: 0.9;
      }
      .pill {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.5rem 0.9rem;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
      }
      button {
        margin-top: 1.5rem;
        padding: 0.85rem 1.2rem;
        border: 0;
        border-radius: 0.8rem;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.05);
      }
      #result {
        margin-top: 1rem;
        min-height: 1.5rem;
        font-size: 1rem;
        opacity: 0.95;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Frontend + API test</h1>
      <p>Press the button to call the backend route and display its response.</p>
      <div class="pill">Vercel frontend talking to FastAPI backend</div>
      <div>
        <button id="call-api">Call API</button>
      </div>
      <div id="result">No response yet.</div>
    </main>

    <script>
      const button = document.getElementById('call-api');
      const result = document.getElementById('result');

      button.addEventListener('click', async () => {
        result.textContent = 'Loading...';

        try {
          const response = await fetch('/api/message');

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          result.textContent = data.message;
        } catch (error) {
          result.textContent = `Request failed: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
